<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Жеке кабинет | EduAI</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #10b981;
            --dark: #1e293b;
            --light: #f8fafc;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            margin: 0;
            display: flex;
        }

        /* Sidebar стилі */
        .sidebar {
            width: 260px;
            background: var(--dark);
            height: 100vh;
            color: white;
            padding: 30px 20px;
            position: fixed;
        }

        .sidebar h2 { color: var(--secondary); margin-bottom: 40px; }
        .nav-link {
            display: flex;
            align-items: center;
            padding: 15px;
            color: #cbd5e1;
            text-decoration: none;
            border-radius: 10px;
            margin-bottom: 10px;
            transition: 0.3s;
        }
        .nav-link:hover, .nav-link.active { background: var(--primary); color: white; }
        .nav-link i { margin-right: 15px; }

        /* Негізгі контент */
        .main-content {
            margin-left: 260px;
            padding: 40px;
            width: calc(100% - 260px);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        /* Профиль картасы */
        .profile-card {
            background: var(--white);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 30px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
            border: 5px solid #e2e8f0;
        }

        .user-info h1 { margin: 0; color: var(--dark); }
        .user-info p { color: #64748b; margin: 5px 0; }

        /* Статистика блоктары */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .stat-box {
            background: var(--white);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .stat-box i { font-size: 2rem; color: var(--primary); margin-bottom: 15px; }
        .stat-box h3 { font-size: 2rem; margin: 10px 0; color: var(--dark); }
        .stat-box p { color: #64748b; margin: 0; }

        /* Жетістіктер (Badges) */
        .achievements {
            margin-top: 30px;
            background: var(--white);
            padding: 30px;
            border-radius: 20px;
        }

        .badge-list {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .badge {
            text-align: center;
            opacity: 0.3; /* Әзірге жабық */
            filter: grayscale(1);
        }

        .badge.unlocked { opacity: 1; filter: none; }
        .badge i {
            font-size: 3rem;
            color: #f59e0b;
            background: #fef3c7;
            padding: 20px;
            border-radius: 50%;
            margin-bottom: 10px;
        }
/* =========================================
   ТҮНГІ РЕЖИМ (DARK MODE) СТИЛЬДЕРІ
========================================= */
body.dark-mode {
    --light-bg: #111827;     /* Негізгі фон қараңғы */
    --white: #1f2937;        /* Карточкалар фоны */
    --text-color: #e5e7eb;   /* Жалпы мәтін түсі ақшыл */
    --dark-bg: #f8fafc;      /* Тақырыптар түсі ақ */
    background-color: var(--light-bg);
    color: var(--text-color);
}

/* Қараңғы режимдегі карточкалар мен блоктар */
body.dark-mode .card, 
body.dark-mode .quiz-card, 
body.dark-mode .reg-card,
body.dark-mode .profile-card,
body.dark-mode .stat-box,
body.dark-mode details, 
body.dark-mode .lessons-list,
body.dark-mode .modal-content,
body.dark-mode .chat-box {
    background-color: var(--white);
    color: var(--text-color);
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

body.dark-mode h1, 
body.dark-mode h2, 
body.dark-mode h3, 
body.dark-mode h4, 
body.dark-mode summary,
body.dark-mode .question-text {
    color: var(--dark-bg) !important;
}

body.dark-mode header, 
body.dark-mode .header-container {
    background-color: var(--white);
    border-bottom: 1px solid #374151;
}

body.dark-mode input, 
body.dark-mode select, 
body.dark-mode textarea {
    background-color: #374151;
    color: #fff;
    border: 1px solid #4b5563;
}

/* Түнгі режимді ауыстыру батырмасының дизайны */
.theme-toggle {
    background: transparent;
    border: none;
    color: var(--text-color);
    font-size: 1.5rem;
    cursor: pointer;
    transition: 0.3s;
    margin-left: 15px;
    display: flex;
    align-items: center;
}
.theme-toggle:hover { color: var(--primary-color); }

/* =========================================
   МОБИЛЬДІ НҰСҚАҒА ОҢТАЙЛАНДЫРУ
========================================= */
/* Видеоларды телефонға бейімдеу (16:9) */
.video-responsive {
    position: relative;
    width: 100%;
    padding-bottom: 56.25%; 
    height: 0;
    border-radius: 8px;
    overflow: hidden;
    margin-top: 15px;
}
.video-responsive iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

@media (max-width: 768px) {
    .container { padding: 0 15px; }
    .grid-cards, .stats-grid { grid-template-columns: 1fr; }
    .split-layout, .split-layout.reverse { flex-direction: column; }
    .hero h1 { font-size: 2rem; }
    header .header-container { flex-direction: column; gap: 15px; height: auto; padding: 15px 0;}
    nav ul { flex-wrap: wrap; justify-content: center; gap: 10px; padding: 0;}
    
    /* Профиль бетіндегі sidebar-ды телефонда жоғары шығару */
    .sidebar { width: 100%; height: auto; position: relative; padding: 15px; display: flex; overflow-x: auto; gap: 10px;}
    .sidebar h2 { display: none; } /* Телефонда логотипті жасыруға болады */
    .main-content { margin-left: 0; width: 100%; padding: 20px 10px; }
    .profile-card { flex-direction: column; text-align: center; }
    
    /* Сабақтар мен модальды терезелер */
    .lesson-item { flex-direction: column; }
    .modal-content { width: 95%; padding: 20px; }
}
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>EduAI Panel</h2>
        <a href="index.html.html" class="nav-link"><i class="fas fa-home"></i> Басты бет</a>
        <a href="profile.html" class="nav-link active"><i class="fas fa-user"></i> Профиль</a>
        <a href="course.html.html" class="nav-link"><i class="fas fa-book"></i> Курстар</a>
        <a href="quiz.html" class="nav-link"><i class="fas fa-tasks"></i> Тесттер</a>
    </div>

    <div class="main-content">
        <div class="header">
<button class="theme-toggle" onclick="toggleTheme()" title="Түнгі/Күндізгі режим">
    <i class="fas fa-moon" id="theme-icon"></i>
</button>
            <h2>Оқушының жұмыс үстелі</h2>
            <button onclick="editProfile()" style="padding: 10px 20px; border-radius: 10px; border: none; background: var(--primary); color: white; cursor: pointer;">
                <i class="fas fa-edit"></i> Профильді өңдеу
            </button>
        </div>

        <div class="profile-card">
            <div class="avatar" id="user-avatar">А</div>
            <div class="user-info">
                <h1 id="display-name">Акбота Азильханова</h1>
                <p><i class="fas fa-graduation-cap"></i> 11-сынып оқушысы</p>
                <p><i class="fas fa-map-marker-alt"></i> Қазақстан, Алматы</p>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <i class="fas fa-star"></i>
                <h3 id="stat-xp">0</h3>
                <p>Жалпы XP (Ұпай)</p>
            </div>
            <div class="stat-box">
                <i class="fas fa-fire"></i>
                <h3 id="stat-level">1</h3>
                <p>Деңгей (Level)</p>
            </div>
            <div class="stat-box">
                <i class="fas fa-check-circle"></i>
                <h3 id="stat-tasks">0</h3>
                <p>Аяқталған тапсырма</p>
            </div>
        </div>

        <div class="achievements">
            <h3>Менің жетістіктерім</h3>
            <div class="badge-list">
                <div class="badge unlocked" title="Алғашқы қадам">
                    <i class="fas fa-seedling"></i>
                    <p>Жаңадан бастаушы</p>
                </div>
                <div class="badge" id="badge-python">
                    <i class="fas fa-code"></i>
                    <p>Python шебері</p>
                </div>
                <div class="badge" id="badge-ai">
                    <i class="fas fa-robot"></i>
                    <p>ЖИ зерттеушісі</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Мәліметтерді LocalStorage-дан жүктеу
       function loadProfileData() {
    // Мәліметтерді оқу
    const name = localStorage.getItem('eduai_user_name') || "Қонақ";
    const userClass = localStorage.getItem('eduai_user_class') || "Анықталмаған";
    const city = localStorage.getItem('eduai_user_city') || "Анықталмаған";
    const xp = parseInt(localStorage.getItem('eduai_xp')) || 0;

    // Интерфейске шығару
    document.getElementById('display-name').innerText = name;
    document.getElementById('display-class').innerText = userClass;
    document.getElementById('display-city').innerText = city;
    document.getElementById('stat-xp').innerText = xp;
    document.getElementById('user-avatar').innerText = name.charAt(0).toUpperCase();
}

function editProfile() {
    // Жаңа мәліметтерді сұрау
    const newName = prompt("Жаңа аты-жөніңіз:", document.getElementById('display-name').innerText);
    const newClass = prompt("Жаңа сыныбыңыз:", document.getElementById('display-class').innerText);
    const newCity = prompt("Жаңа қалаңыз:", document.getElementById('display-city').innerText);

    if (newName && newClass && newCity) {
        localStorage.setItem('eduai_user_name', newName);
        localStorage.setItem('eduai_user_class', newClass);
        localStorage.setItem('eduai_user_city', newCity);
        loadProfileData(); // Мәліметтерді қайта жүктеу
        alert("Мәліметтер сәтті жаңартылды!");
    }
}
window.onload = loadProfileData;
// Түнгі режимді қосу/өшіру және жадта сақтау
function toggleTheme() {
    const body = document.body;
    const themeIcon = document.getElementById('theme-icon');
    body.classList.toggle('dark-mode');
    
    if (body.classList.contains('dark-mode')) {
        localStorage.setItem('eduai_theme', 'dark');
        if(themeIcon) themeIcon.className = 'fas fa-sun';
    } else {
        localStorage.setItem('eduai_theme', 'light');
        if(themeIcon) themeIcon.className = 'fas fa-moon';
    }
}

// Бет жүктелгенде оқушының бұрынғы таңдауын тексеру
window.addEventListener('DOMContentLoaded', () => {
    const savedTheme = localStorage.getItem('eduai_theme');
    const themeIcon = document.getElementById('theme-icon');
    if (savedTheme === 'dark') {
        document.body.classList.add('dark-mode');
        if(themeIcon) themeIcon.className = 'fas fa-sun';
    }
});
    </script>
</body>
</html>
